<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raiden Bot — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    h1 { font-size: 2.5rem; color: #7eb8ff; margin-bottom: .5rem; }
    p  { color: #aaa; margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      padding: .35rem .9rem;
      border-radius: 999px;
      background: #1e1e3a;
      border: 1px solid #7eb8ff44;
      font-size: .85rem;
      color: #7eb8ff;
    }
    .status { margin-top: 2rem; font-size: .8rem; color: #555; }
  </style>
</head>
<body>
  <h1>⚡ Raiden Bot</h1>
  <p>Facebook Messenger Bot — running successfully.</p>
  <span class="badge">🟢 Online</span>
  <div class="status">Built with Node.js ESM · Powered by stfca</div>
</body>
</html>
